services:
  - type: web
    name: max-bot-1-ywpz
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      find . -name "*.pyc" -delete
      find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
      echo "✅ Сборка и очистка кэша завершены"
    startCommand: python main.py
    numInstances: 1
    plan: free
    envVars:
      - key: MAX_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: DATABASE_URL
        value: postgresql://fredi_db_flz2_user:PP1FP91G1P6mn1uS8iBLGlk38bKqzkGy@dpg-d739b31r0fns739a7oj0-a.oregon-postgres.render.com/fredi_db_flz2
      - key: PORT
        value: 10000
      - key: RENDER
        value: true
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: max-bot-miniapp
    runtime: static
    buildCommand: echo "✅ Статический сайт готов"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    envVars:
      - key: API_BACKEND_URL
        value: https://max-bot-1-ywpz.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://max-bot-1-ywpz.onrender.com/api/*
      - type: rewrite
        source: /health
        destination: https://max-bot-1-ywpz.onrender.com/health
    autoDeploy: true
