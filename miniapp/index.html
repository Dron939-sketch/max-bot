    <!-- ========== МОБИЛЬНАЯ ИНИЦИАЛИЗАЦИЯ ========== -->
    <script>
        // Принудительная инициализация для мобильных
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isMaxWebView = !!(window.MAX && window.MAX.WebApp);
            
            console.log('📱 Мобильное устройство detected:', isMobile);
            console.log('📱 MAX WebView:', isMaxWebView);
            
            // Запрос микрофона при первом касании (только для мобильных)
            if (isMobile) {
                document.addEventListener('touchstart', async function requestMicrophoneOnTouch() {
                    document.removeEventListener('touchstart', requestMicrophoneOnTouch);
                    console.log('🎤 Запрос микрофона после касания...');
                    
                    try {
                        // Для MAX WebView используем специальный метод
                        if (isMaxWebView && window.MAX && window.MAX.WebApp && window.MAX.WebApp.getUserMedia) {
                            const stream = await window.MAX.WebApp.getUserMedia({ audio: true });
                            stream.getTracks().forEach(track => track.stop());
                            console.log('✅ Микрофон разрешён через MAX');
                        } else if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            stream.getTracks().forEach(track => track.stop());
                            console.log('✅ Микрофон разрешён через Web API');
                        }
                        localStorage.setItem('microphone_permission', 'granted');
                    } catch (e) {
                        console.warn('❌ Микрофон не разрешён:', e);
                        localStorage.setItem('microphone_permission', 'denied');
                    }
                }, { once: true });
            }
        })();
    </script>
    
    <!-- ========== КРИТИЧЕСКИ ВАЖНО: УСТАНОВКА maxContext ДО ВСЕХ СКРИПТОВ ========== -->
    <script>
        // Функция получения user_id из MAX
        function getUserIdFromMax() {
            console.log('🔍 Получение user_id из MAX...');
            
            // 1. MAX мессенджер (основной способ)
            if (window.MAX && window.MAX.WebApp && window.MAX.WebApp.initDataUnsafe) {
                const initData = window.MAX.WebApp.initDataUnsafe;
                if (initData.user && initData.user.id) {
                    console.log('✅ user_id из MAX.WebApp:', initData.user.id);
                    return initData.user.id;
                }
                if (initData.user_id) {
                    console.log('✅ user_id из MAX.WebApp.user_id:', initData.user_id);
                    return initData.user_id;
                }
            }
            
            // 2. Telegram (если портировано)
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe) {
                const initData = window.Telegram.WebApp.initDataUnsafe;
                if (initData.user && initData.user.id) {
                    console.log('✅ user_id из Telegram.WebApp:', initData.user.id);
                    return initData.user.id;
                }
            }
            
            // 3. Из URL параметров (для отладки и тестирования)
            const urlParams = new URLSearchParams(window.location.search);
            const urlUserId = urlParams.get('user_id') || urlParams.get('userId') || urlParams.get('uid');
            if (urlUserId) {
                console.log('✅ user_id из URL:', urlUserId);
                localStorage.setItem('fredi_user_id', urlUserId);
                return urlUserId;
            }
            
            // 4. Из localStorage (сохранённый ранее)
            const savedUserId = localStorage.getItem('fredi_user_id');
            if (savedUserId) {
                console.log('✅ user_id из localStorage:', savedUserId);
                return savedUserId;
            }
            
            // 5. Тестовый ID только для разработки (если не в MAX)
            if (!window.MAX || !window.MAX.WebApp) {
                console.warn('⚠️ Режим разработки: используется тестовый user_id');
                const testId = Math.floor(Math.random() * 1000000000).toString();
                localStorage.setItem('fredi_user_id', testId);
                console.log('🔧 Создан тестовый ID:', testId);
                return testId;
            }
            
            console.error('❌ Не удалось получить user_id!');
            return null;
        }
        
        // Функция получения имени пользователя
        function getUserNameFromMax() {
            // MAX
            if (window.MAX && window.MAX.WebApp && window.MAX.WebApp.initDataUnsafe) {
                const initData = window.MAX.WebApp.initDataUnsafe;
                if (initData.user && initData.user.first_name) {
                    return initData.user.first_name;
                }
                if (initData.first_name) {
                    return initData.first_name;
                }
            }
            
            // Telegram
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe) {
                const initData = window.Telegram.WebApp.initDataUnsafe;
                if (initData.user && initData.user.first_name) {
                    return initData.user.first_name;
                }
            }
            
            // Из localStorage
            const savedName = localStorage.getItem('userName');
            if (savedName && savedName !== 'Гость') {
                return savedName;
            }
            
            return null;
        }
        
        // УСТАНАВЛИВАЕМ ГЛОБАЛЬНЫЙ maxContext
        window.maxContext = window.maxContext || {};
        window.maxContext.user_id = getUserIdFromMax();
        window.maxContext.user_name = getUserNameFromMax() || 'Друг';
        window.maxContext.isMax = !!(window.MAX && window.MAX.WebApp);
        
        console.log('🎯 maxContext установлен:', {
            user_id: window.maxContext.user_id,
            user_name: window.maxContext.user_name,
            isMax: window.maxContext.isMax
        });
        
        // Если нет user_id — показываем ошибку и блокируем загрузку
        if (!window.maxContext.user_id) {
            console.error('❌ КРИТИЧЕСКАЯ ОШИБКА: Нет user_id!');
            document.addEventListener('DOMContentLoaded', function() {
                document.body.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;background:#0e1621;color:white;">
                        <div>
                            <div style="font-size:64px;margin-bottom:20px;">🔐</div>
                            <h2 style="margin-bottom:12px;">Ошибка входа</h2>
                            <p style="color:#8e9aa6;margin-bottom:24px;">
                                Не удалось идентифицировать пользователя.<br>
                                Пожалуйста, откройте приложение через MAX.
                            </p>
                            <button onclick="location.reload()" style="padding:14px 32px;background:#248bf2;color:white;border:none;border-radius:40px;font-size:16px;cursor:pointer;">
                                🔄 ПОВТОРИТЬ
                            </button>
                        </div>
                    </div>
                `;
            });
        }
    </script>

<body>

    <!-- Дополнительная инициализация для мобильных -->
    <script>
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                console.log('📱 Мобильная версия: добавляем дополнительные обработчики');
                
                // Добавляем кнопку для повторного запроса микрофона в дашборде
                const originalRenderDashboard = window.FrediDashboard?.prototype?.renderDashboard;
                if (originalRenderDashboard && window.FrediDashboard) {
                    window.FrediDashboard.prototype.renderDashboard = function() {
                        originalRenderDashboard.call(this);
                        
                        // Добавляем кнопку запроса микрофона после отрисовки
                        setTimeout(() => {
                            const container = document.getElementById('screenContainer');
                            if (container && !document.getElementById('mobileMicrophoneBtn')) {
                                const micBtn = document.createElement('button');
                                micBtn.id = 'mobileMicrophoneBtn';
                                micBtn.className = 'microphone-request-btn';
                                micBtn.innerHTML = '🎤 АКТИВИРОВАТЬ МИКРОФОН';
                                micBtn.onclick = async () => {
                                    if (window.maxMicrophoneManager) {
                                        const granted = await window.maxMicrophoneManager.requestMicrophone();
                                        if (granted) {
                                            this.showFloatingMessage('✅ Микрофон активирован!', 'success');
                                            micBtn.style.display = 'none';
                                        }
                                    }
                                };
                                container.appendChild(micBtn);
                            }
                        }, 1000);
                    };
                }
            }
        })();
    </script>
