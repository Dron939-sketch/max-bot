<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФРЕДИ - Виртуальный психолог</title>
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* ========== КРАСИВЫЙ ФОН КАК В TELEGRAM ========== */
        :root {
            --tg-bg-light: #f5f7fa;
            --tg-bg-dark: #0a0f14;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-bg-light);
            position: relative;
            min-height: 100vh;
        }
        
        /* Текстура "шум" как в Telegram */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, 
                    rgba(0, 0, 0, 0.02) 0px, 
                    rgba(0, 0, 0, 0.02) 1px, 
                    transparent 1px, 
                    transparent 12px),
                repeating-linear-gradient(135deg, 
                    rgba(0, 0, 0, 0.02) 0px, 
                    rgba(0, 0, 0, 0.02) 1px, 
                    transparent 1px, 
                    transparent 12px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Дополнительный градиент поверх */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(64, 167, 227, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background-color: var(--tg-bg-dark);
            }
            
            body::before {
                background-image: 
                    repeating-linear-gradient(45deg, 
                        rgba(255, 255, 255, 0.02) 0px, 
                        rgba(255, 255, 255, 0.02) 1px, 
                        transparent 1px, 
                        transparent 12px),
                    repeating-linear-gradient(135deg, 
                        rgba(255, 255, 255, 0.02) 0px, 
                        rgba(255, 255, 255, 0.02) 1px, 
                        transparent 1px, 
                        transparent 12px);
            }
            
            body::after {
                background: radial-gradient(circle at 20% 50%, rgba(64, 167, 227, 0.05) 0%, transparent 50%);
            }
        }
        
        #app {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Стеклянные элементы */
        .glass-effect {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
        }
        
        @media (prefers-color-scheme: dark) {
            .glass-effect {
                background: rgba(31, 31, 31, 0.8) !important;
                border-color: rgba(255, 255, 255, 0.1) !important;
            }
        }
        
        /* Убираем лишние фоны */
        .header, .nav-bar, .stages-list, .mode-header, .mode-card,
        .profile-section, .thought-block, .goal-card, .examples-section,
        .messages-container, .profile-badge, .menu-card, .weekend-hint,
        .result-screen, .path-steps, .reality-check-screen, .custom-goal-screen,
        .weekend-ideas-screen .ideas-container {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
        }
        
        @media (prefers-color-scheme: dark) {
            .header, .nav-bar, .stages-list, .mode-header, .mode-card,
            .profile-section, .thought-block, .goal-card, .examples-section,
            .messages-container, .profile-badge, .menu-card, .weekend-hint,
            .result-screen, .path-steps, .reality-check-screen, .custom-goal-screen,
            .weekend-ideas-screen .ideas-container {
                background: rgba(31, 31, 31, 0.8) !important;
                border-color: rgba(255, 255, 255, 0.1) !important;
            }
        }
    </style>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Шапка -->
        <header class="header">
            <button class="back-btn" id="backBtn" style="display: none;">←</button>
            <h1 id="header-title">👋 ФРЕДИ</h1>
            <div class="header-placeholder"></div>
        </header>
        
        <!-- Основной контент -->
        <main class="content" id="content">
            <!-- Контент будет загружаться через script.js -->
        </main>
        
        <!-- Нижняя навигация -->
        <nav class="nav-bar" id="navBar" style="display: none;">
            <button class="nav-btn" onclick="showScreen('main')">
                <span>🏠</span> Главная
            </button>
            <button class="nav-btn" onclick="showScreen('profile')">
                <span>📊</span> Профиль
            </button>
            <button class="nav-btn" onclick="showScreen('goals')">
                <span>🎯</span> Цели
            </button>
            <button class="nav-btn" onclick="showScreen('ask')">
                <span>❓</span> Чат
            </button>
        </nav>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
