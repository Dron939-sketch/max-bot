<!DOCTYPE html>
<html lang="ru">
<head>

    <!-- MAX Bridge (нужно для работы в MAX) -->
    <script src="https://max.ru/webapps/js/bridge.js"></script>
    
    <style>
        /* ========== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ========== */
        :root {
            --max-bg-light: #f0f2f5;
            --max-bg-dark: #0e1621;
            --max-surface-light: rgba(255, 255, 255, 0.9);
            --max-surface-dark: rgba(30, 37, 48, 0.9);
            --fredi-blue: #40a7e3;
            --fredi-blue-light: rgba(64, 167, 227, 0.1);
            --fredi-blue-medium: rgba(64, 167, 227, 0.2);
            --header-height: 60px;
            --nav-height: 70px;
            --safe-area-top: env(safe-area-inset-top, 0);
            --safe-area-bottom: env(safe-area-inset-bottom, 0);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--max-bg-light);
            color: #000;
            line-height: 1.5;
            font-size: 16px;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }
        
        [data-max-theme="dark"] body {
            background: var(--max-bg-dark);
            color: #fff;
        }
        
        #app {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: var(--safe-area-top);
            padding-bottom: var(--safe-area-bottom);
        }
        
        /* ========== ШАПКА ========== */
        .header {
            height: var(--header-height);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(224, 224, 224, 0.5);
            background: var(--max-surface-light);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        [data-max-theme="dark"] .header {
            background: var(--max-surface-dark);
            border-bottom-color: rgba(58, 58, 58, 0.5);
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
            color: var(--fredi-blue);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .back-btn.visible { display: flex; }
        
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: inherit;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .header-placeholder { width: 40px; }
        
        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: calc(var(--nav-height) + 16px);
            -webkit-overflow-scrolling: touch;
        }
        
        /* ========== НИЖНЯЯ НАВИГАЦИЯ ========== */
        .nav-bar {
            height: var(--nav-height);
            background: var(--max-surface-light);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(224, 224, 224, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
            position: fixed;
            bottom: var(--safe-area-bottom);
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            z-index: 100;
        }
        
        [data-max-theme="dark"] .nav-bar {
            background: var(--max-surface-dark);
            border-top-color: rgba(58, 58, 58, 0.5);
        }
        
        .nav-btn {
            flex: 1;
            height: 48px;
            border: none;
            background: transparent;
            color: #8e8e93;
            font-size: 14px;
            font-weight: 500;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
        }
        
        .nav-btn span { font-size: 20px; }
        
        .nav-btn.active {
            color: var(--fredi-blue);
            background: var(--fredi-blue-light);
        }
        
        /* ========== СТЕКЛЯННЫЕ КАРТОЧКИ ========== */
        .glass-card {
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }
        
        [data-max-theme="dark"] .glass-card {
            background: var(--max-surface-dark);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        /* ========== КНОПКА ПЕРЕЗАПУСКА ========== */
        .restart-test-btn {
            margin: 8px 0 16px;
            background: rgba(64, 167, 227, 0.1) !important;
            border: 1px dashed var(--fredi-blue) !important;
            color: var(--fredi-blue) !important;
        }
        
        /* ========== ЭКРАН ТЕСТА ========== */
        .test-screen {
            animation: fadeIn 0.3s;
        }
        
        .stage-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--fredi-blue);
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(128,128,128,0.2);
            border-radius: 3px;
            margin: 16px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--fredi-blue);
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .question-card {
            padding: 24px;
            margin-bottom: 24px;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
        }
        
        /* ========== КНОПКИ ОТВЕТОВ (КАК В TELEGRAM/MAX) ========== */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        
        .option-btn {
            width: 100%;
            padding: 16px 20px;
            background: var(--max-surface-light);
            border: 1px solid rgba(224, 224, 224, 0.5);
            border-radius: 14px;
            font-size: 16px;
            text-align: left;
            color: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(8px);
        }
        
        [data-max-theme="dark"] .option-btn {
            background: var(--max-surface-dark);
        }
        
        .option-btn:hover {
            background: rgba(64, 167, 227, 0.1);
            transform: translateX(4px);
        }
        
        .option-btn:active {
            transform: scale(0.98);
        }
        
        .option-letter {
            width: 32px;
            height: 32px;
            background: var(--fredi-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .option-text {
            flex: 1;
            line-height: 1.5;
        }
        
        /* Стили для выбранного ответа */
        .option-btn.selected {
            background: rgba(64, 167, 227, 0.2);
            border-color: var(--fredi-blue);
        }
        
        .option-btn.selected .option-letter {
            background: white;
            color: var(--fredi-blue);
        }
        
        /* ========== ЭКРАН РЕЗУЛЬТАТА ЭТАПА ========== */
        .stage-result {
            text-align: center;
            padding: 20px;
        }
        
        .result-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .result-text {
            font-size: 18px;
            line-height: 1.6;
            margin: 20px 0;
            padding: 20px;
        }
        
        .continue-btn {
            width: 100%;
            height: 56px;
            background: var(--fredi-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* ========== КНОПКИ ========== */
        .action-btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .action-btn.primary {
            background: var(--fredi-blue);
            color: white;
        }
        
        .action-btn.secondary {
            background: var(--max-surface-light);
            border: 1px solid rgba(224, 224, 224, 0.5);
            color: inherit;
        }
        
        /* ========== ЗАГРУЗКА ========== */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(64, 167, 227, 0.3);
            border-top-color: var(--fredi-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 480px) {
            .option-btn { padding: 14px 16px; }
            .question-card { padding: 20px; font-size: 16px; }
        }
        
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
    </style>
</head>

                // Начать тест
                startTest: function() {
                    this.testState = {
                        currentStage: 1,
                        currentQuestion: 0,
                        answers: [],
                        stage1Scores: { EXTERNAL: 0, INTERNAL: 0, SYMBOLIC: 0, MATERIAL: 0 },
                        stage2Levels: {},
                        stage3Vectors: { СБ: [], ТФ: [], УБ: [], ЧВ: [] },
                        stage4Dilts: { ENVIRONMENT: 0, BEHAVIOR: 0, CAPABILITIES: 0, VALUES: 0, IDENTITY: 0 },
                        stage5Patterns: []
                    };
                    this.showTestScreen();
                },
                
                // Показать экран теста
                showTestScreen: function() {
                    const stage = this.testState.currentStage;
                    const stageData = this.testData[`stage${stage}`];
                    const questionIndex = this.testState.currentQuestion;
                    const question = stageData.questions[questionIndex];
                    const total = stageData.questions.length;
                    const progress = Math.round((questionIndex + 1) / total * 100);
                    
                    let html = `
                        <div class="test-screen">
                            <div class="stage-title">${stageData.title}</div>
                            
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span>Вопрос ${questionIndex + 1}/${total}</span>
                                <span>${progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            
                            <div class="question-card glass-card">
                                ${question.text}
                            </div>
                            
                            <div class="options-grid">
                    `;
                    
                    question.options.forEach((option, index) => {
                        const letter = String.fromCharCode(65 + index);
                        html += `
                            <button class="option-btn" onclick="window.app.selectAnswer('${option.id}', ${index})">
                                <span class="option-letter">${letter}</span>
                                <span class="option-text">${option.text}</span>
                            </button>
                        `;
                    });
                    
                    html += `</div></div>`;
                    document.getElementById('content').innerHTML = html;
                    this.showScreen('test');
                },
                
                // Выбрать ответ
                selectAnswer: function(optionId, optionIndex) {
                    const stage = this.testState.currentStage;
                    const stageData = this.testData[`stage${stage}`];
                    const questionIndex = this.testState.currentQuestion;
                    const question = stageData.questions[questionIndex];
                    const selectedOption = question.options[optionIndex];
                    
                    // Сохраняем ответ
                    const answer = {
                        stage: stage,
                        question: questionIndex,
                        option: optionId,
                        text: selectedOption.text
                    };
                    this.testState.answers.push(answer);
                    
                    // Обновляем очки в зависимости от этапа
                    if (stage === 1) {
                        // Этап 1 - восприятие
                        for (let key in selectedOption.scores) {
                            this.testState.stage1Scores[key] += selectedOption.scores[key];
                        }
                    } else if (stage === 2) {
                        // Этап 2 - мышление
                        const level = selectedOption.level;
                        this.testState.stage2Levels[level] = (this.testState.stage2Levels[level] || 0) + 1;
                    } else if (stage === 3) {
                        // Этап 3 - поведение
                        const vector = selectedOption.vector;
                        const level = selectedOption.level;
                        if (vector && this.testState.stage3Vectors[vector]) {
                            this.testState.stage3Vectors[vector].push(level);
                        }
                    } else if (stage === 4) {
                        // Этап 4 - точка роста
                        const dilts = selectedOption.dilts;
                        this.testState.stage4Dilts[dilts] = (this.testState.stage4Dilts[dilts] || 0) + 1;
                    } else if (stage === 5) {
                        // Этап 5 - глубинные паттерны
                        this.testState.stage5Patterns.push({
                            target: selectedOption.target,
                            pattern: selectedOption.pattern
                        });
                    }
                    
                    // Отправляем на сервер
                    fetch('/api/save-test-progress', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: this.userId,
                            stage: stage,
                            answers: [{
                                question: questionIndex,
                                answer: optionId,
                                text: selectedOption.text
                            }]
                        })
                    }).catch(err => console.log('Ошибка сохранения:', err));
                    
                    // Переходим к следующему вопросу
                    this.nextQuestion();
                },
                
                // Следующий вопрос
                nextQuestion: function() {
                    const stage = this.testState.currentStage;
                    const total = this.testData[`stage${stage}`].questions.length;
                    
                    if (this.testState.currentQuestion + 1 < total) {
                        this.testState.currentQuestion++;
                        this.showTestScreen();
                    } else {
                        this.completeStage();
                    }
                },
                
                // Завершить этап
                completeStage: function() {
                    const stage = this.testState.currentStage;
                    
                    // Рассчитываем результат этапа
                    let resultText = '';
                    let nextStage = stage + 1;
                    
                    if (stage === 1) {
                        const scores = this.testState.stage1Scores;
                        const external = scores.EXTERNAL;
                        const internal = scores.INTERNAL;
                        const symbolic = scores.SYMBOLIC;
                        const material = scores.MATERIAL;
                        
                        let perceptionType = '';
                        if (external > internal && symbolic > material) perceptionType = 'СОЦИАЛЬНО-ОРИЕНТИРОВАННЫЙ';
                        else if (external > internal && material >= symbolic) perceptionType = 'СТАТУСНО-ОРИЕНТИРОВАННЫЙ';
                        else if (internal >= external && symbolic > material) perceptionType = 'СМЫСЛО-ОРИЕНТИРОВАННЫЙ';
                        else perceptionType = 'ПРАКТИКО-ОРИЕНТИРОВАННЫЙ';
                        
                        resultText = `Ваш тип восприятия: **${perceptionType}**`;
                        
                        // Сохраняем в профиль
                        fetch('/api/save-profile', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user_id: this.userId,
                                profile: { perception_type: perceptionType }
                            })
                        });
                    } else if (stage === 2) {
                        const totalScore = Object.values(this.testState.stage2Levels).reduce((a, b) => a + b, 0);
                        let thinkingLevel = 1;
                        if (totalScore <= 10) thinkingLevel = 1;
                        else if (totalScore <= 20) thinkingLevel = 2;
                        else if (totalScore <= 30) thinkingLevel = 3;
                        else if (totalScore <= 40) thinkingLevel = 4;
                        else if (totalScore <= 50) thinkingLevel = 5;
                        else if (totalScore <= 60) thinkingLevel = 6;
                        else if (totalScore <= 70) thinkingLevel = 7;
                        else if (totalScore <= 80) thinkingLevel = 8;
                        else thinkingLevel = 9;
                        
                        resultText = `Ваш уровень мышления: **${thinkingLevel}/9**`;
                    } else if (stage === 3) {
                        const vectors = this.testState.stage3Vectors;
                        let avgVectors = {};
                        for (let v in vectors) {
                            if (vectors[v].length > 0) {
                                avgVectors[v] = Math.round(vectors[v].reduce((a, b) => a + b, 0) / vectors[v].length);
                            }
                        }
                        resultText = `Ваши векторы: СБ-${avgVectors.СБ || 3}, ТФ-${avgVectors.ТФ || 3}, УБ-${avgVectors.УБ || 3}, ЧВ-${avgVectors.ЧВ || 3}`;
                    } else if (stage === 4) {
                        const dilts = this.testState.stage4Dilts;
                        const dominant = Object.keys(dilts).reduce((a, b) => dilts[a] > dilts[b] ? a : b);
                        resultText = `Ваша точка роста: **${dominant}**`;
                    } else if (stage === 5) {
                        resultText = `✅ Тест завершен! Спасибо за участие.`;
                        nextStage = null;
                    }
                    
                    // Показываем результат этапа
                    document.getElementById('content').innerHTML = `
                        <div class="stage-result">
                            <div class="result-emoji">${stage === 5 ? '🎉' : '✨'}</div>
                            <h2>Этап ${stage} завершен!</h2>
                            <div class="result-text glass-card">${resultText}</div>
                            ${nextStage ? `
                                <button class="continue-btn" onclick="window.app.goToStage(${nextStage})">
                                    Перейти к этапу ${nextStage} →
                                </button>
                            ` : `
                                <button class="continue-btn" onclick="window.app.showScreen('profile')">
                                    Посмотреть профиль →
                                </button>
                            `}
                        </div>
                    `;
                },
                
                // Перейти к следующему этапу
                goToStage: function(stage) {
                    this.testState.currentStage = stage;
                    this.testState.currentQuestion = 0;
                    this.showTestScreen();
                },
                
                // Заглушки для других экранов
                loadProfileScreen: function() {
                    document.getElementById('content').innerHTML = '<div class="text-center mt-4">Профиль загружается...</div>';
                },
                loadGoalsScreen: function() {
                    document.getElementById('content').innerHTML = '<div class="text-center mt-4">Цели загружаются...</div>';
                },
                loadAskScreen: function() {
                    document.getElementById('content').innerHTML = '<div class="text-center mt-4">Чат загружается...</div>';
                }
            };
            
            // Обработчик кнопки назад
            document.getElementById('backBtn').addEventListener('click', function() {
                if (window.app.currentScreen === 'test') {
                    if (confirm('Прервать тест?')) {
                        window.app.showScreen('main');
                    }
                } else {
                    window.app.showScreen('main');
                }
            });
            
            // Запускаем
            window.app.init();
        })();
    </script>
</body>
</html>
