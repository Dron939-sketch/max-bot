<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ФРЕДИ - Виртуальный психолог</title>
    
    <!-- MAX Bridge -->
    <script src="https://max.ru/webapps/js/bridge.js"></script>
    
    <!-- MAX UI библиотека -->
    <link rel="stylesheet" href="https://max.ru/webapps/css/theme.css">
    
    <style>
        /* ========== ВЕСЬ ВАШ CSS ЗДЕСЬ ========== */
        /* (весь тот огромный CSS, который у вас есть) */
        
        :root {
            --max-bg-light: #f0f2f5;
            --max-bg-dark: #0e1621;
            --max-surface-light: rgba(255, 255, 255, 0.9);
            --max-surface-dark: rgba(30, 37, 48, 0.9);
            --fredi-blue: #40a7e3;
            --fredi-blue-light: rgba(64, 167, 227, 0.1);
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--max-bg-light);
            position: relative;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }
        
        /* Основной фон с паттерном "шум" */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, 
                    rgba(0, 0, 0, 0.02) 0px, 
                    rgba(0, 0, 0, 0.02) 1px, 
                    transparent 1px, 
                    transparent 12px),
                repeating-linear-gradient(135deg, 
                    rgba(0, 0, 0, 0.02) 0px, 
                    rgba(0, 0, 0, 0.02) 1px, 
                    transparent 1px, 
                    transparent 12px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Градиентный слой */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(64, 167, 227, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Темная тема */
        [data-max-theme="dark"] body,
        @media (prefers-color-scheme: dark) {
            body {
                background: var(--max-bg-dark);
            }
            
            body::before {
                background-image: 
                    repeating-linear-gradient(45deg, 
                        rgba(255, 255, 255, 0.03) 0px, 
                        rgba(255, 255, 255, 0.03) 1px, 
                        transparent 1px, 
                        transparent 12px),
                    repeating-linear-gradient(135deg, 
                        rgba(255, 255, 255, 0.03) 0px, 
                        rgba(255, 255, 255, 0.03) 1px, 
                        transparent 1px, 
                        transparent 12px);
            }
            
            body::after {
                background: radial-gradient(circle at 20% 50%, rgba(64, 167, 227, 0.08) 0%, transparent 60%);
            }
        }
        
        #app {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        
        /* Стили для блоков */
        .header, .nav-bar, .stages-list, .mode-header, .mode-card,
        .profile-section, .thought-block, .goal-card, .examples-section,
        .messages-container, .profile-badge, .menu-card, .weekend-hint,
        .result-screen, .path-steps, .reality-check-screen, .custom-goal-screen,
        .weekend-ideas-screen .ideas-container,
        .content > div:not(.no-glass) {
            background: var(--max-surface-light) !important;
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        
        .header, .nav-bar {
            border-radius: 0;
            border-left: none;
            border-right: none;
        }
        
        [data-max-theme="dark"] .header,
        [data-max-theme="dark"] .nav-bar,
        [data-max-theme="dark"] .stages-list,
        [data-max-theme="dark"] .mode-header,
        [data-max-theme="dark"] .mode-card,
        [data-max-theme="dark"] .profile-section,
        [data-max-theme="dark"] .thought-block,
        [data-max-theme="dark"] .goal-card,
        [data-max-theme="dark"] .examples-section,
        [data-max-theme="dark"] .messages-container,
        [data-max-theme="dark"] .profile-badge,
        [data-max-theme="dark"] .menu-card,
        [data-max-theme="dark"] .weekend-hint,
        [data-max-theme="dark"] .result-screen,
        [data-max-theme="dark"] .path-steps,
        [data-max-theme="dark"] .reality-check-screen,
        [data-max-theme="dark"] .custom-goal-screen,
        [data-max-theme="dark"] .weekend-ideas-screen .ideas-container,
        [data-max-theme="dark"] .content > div:not(.no-glass) {
            background: var(--max-surface-dark) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        [data-max-theme="dark"] body {
            color: #fff;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }
        
        .back-btn:hover {
            background: rgba(0, 0, 0, 0.05);
        }
        
        [data-max-theme="dark"] .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }
        
        .header-placeholder {
            width: 40px;
        }
        
        .content {
            flex: 1;
            padding: 16px;
        }
        
        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            position: sticky;
            bottom: 0;
            z-index: 100;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        [data-max-theme="dark"] .nav-bar {
            border-top-color: rgba(255, 255, 255, 0.05);
        }
        
        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            color: inherit;
            transition: background-color 0.2s;
        }
        
        .nav-btn span {
            font-size: 20px;
        }
        
        .nav-btn.active {
            background: var(--fredi-blue-light);
            color: var(--fredi-blue);
        }
        
        [data-max-theme="dark"] .nav-btn.active {
            background: rgba(64, 167, 227, 0.2);
        }

        /* Добавьте минимальные стили для загрузки */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(64, 167, 227, 0.3);
            border-radius: 50%;
            border-top-color: #40a7e3;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    
    <!-- ⚠️ ВАЖНО: СТРОКУ С STYLES.CSS УДАЛИЛИ ПОЛНОСТЬЮ! -->
    
</head>
<body>
    <div id="app">
        <header class="header">
            <button class="back-btn" id="backBtn" style="display: none;">←</button>
            <h1 id="header-title">👋 ФРЕДИ</h1>
            <div class="header-placeholder"></div>
        </header>
        
        <main class="content" id="content">
            <!-- Контент будет загружаться через script.js -->
        </main>
        
        <nav class="nav-bar" id="navBar" style="display: none;">
            <button class="nav-btn" onclick="showScreen('main')" data-screen="main">
                <span>🏠</span> Главная
            </button>
            <button class="nav-btn" onclick="showScreen('profile')" data-screen="profile">
                <span>📊</span> Профиль
            </button>
            <button class="nav-btn" onclick="showScreen('goals')" data-screen="goals">
                <span>🎯</span> Цели
            </button>
            <button class="nav-btn" onclick="showScreen('ask')" data-screen="ask">
                <span>❓</span> Чат
            </button>
        </nav>
    </div>
    
    <!-- ⚠️ ТУТ ТОЖЕ ПРОВЕРЬТЕ: script.js должен существовать! -->
    <script src="script.js"></script>
    
    <script>
        // Минимальная инициализация для теста
        (function() {
            console.log('🚀 HTML загружен, ждем скрипты...');
            
            // Проверяем MAX
            if (window.MAX) {
                console.log('✅ MAX Bridge найден');
                document.body.parentElement.setAttribute('data-max-theme', window.MAX.theme || 'light');
            } else {
                console.log('⚠️ MAX Bridge не найден');
            }
            
            // Простая функция showScreen для теста
            window.showScreen = function(screenName) {
                console.log('📱 Переход на экран:', screenName);
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.screen === screenName) {
                        btn.classList.add('active');
                    }
                });
                
                // Показываем тестовый контент
                document.getElementById('content').innerHTML = `
                    <div style="padding: 20px; text-align: center;">
                        <h2>🧠 Экран: ${screenName}</h2>
                        <p>Если вы это видите - HTML и CSS работают!</p>
                        <p>Теперь проверяем script.js...</p>
                    </div>
                `;
            };
            
            // Показываем главный экран
            setTimeout(() => window.showScreen('main'), 100);
        })();
    </script>
</body>
</html>
