    <!-- ========== УНИВЕРСАЛЬНОЕ ПОЛУЧЕНИЕ USER_ID (ВСЕ ВЕРСИИ MAX) ========== -->
    <script>
        // ============================================
        // ДИАГНОСТИКА
        // ============================================
        console.log('=== ДИАГНОСТИКА MAX ===');
        console.log('navigator.userAgent:', navigator.userAgent);
        console.log('window.MAX:', window.MAX);
        console.log('window.Telegram:', window.Telegram);
        console.log('location.href:', location.href);
        
        // ============================================
        // УНИВЕРСАЛЬНОЕ ПОЛУЧЕНИЕ USER_ID
        // Поддерживает: мобильный MAX, веб-версию MAX, Telegram
        // ============================================
        
        async function getUserIdFromMax() {
            console.log('🔍 Получение user_id из MAX...');
            
            // ========== 1. МОБИЛЬНЫЙ MAX (через getUser) ==========
            if (window.MAX && window.MAX.WebApp && window.MAX.WebApp.getUser) {
                console.log('🔄 Пробуем MAX.WebApp.getUser() (мобильный)');
                try {
                    const user = await window.MAX.WebApp.getUser();
                    if (user && user.id) {
                        console.log('✅ user_id из getUser():', user.id);
                        return parseInt(user.id);
                    }
                } catch (err) {
                    console.warn('getUser error:', err);
                }
            }
            
            // ========== 2. ВЕБ-ВЕРСИЯ MAX (через initDataUnsafe) ==========
            if (window.MAX && window.MAX.WebApp && window.MAX.WebApp.initDataUnsafe) {
                const initData = window.MAX.WebApp.initDataUnsafe;
                console.log('📦 initDataUnsafe:', initData);
                
                if (initData.user && initData.user.id) {
                    console.log('✅ user_id из initDataUnsafe.user.id:', initData.user.id);
                    return parseInt(initData.user.id);
                }
                
                if (initData.user_id) {
                    console.log('✅ user_id из initDataUnsafe.user_id:', initData.user_id);
                    return parseInt(initData.user_id);
                }
            }
            
            // ========== 3. ВЕБ-ВЕРСИЯ MAX (через WebAppData в URL) ==========
            const urlParams = new URLSearchParams(window.location.search);
            const webAppData = urlParams.get('WebAppData');
            
            if (webAppData) {
                console.log('🔍 Парсим WebAppData из URL...');
                try {
                    let decodedData = webAppData;
                    try {
                        decodedData = decodeURIComponent(webAppData);
                    } catch(e) {}
                    
                    const params = new URLSearchParams(decodedData);
                    const userParam = params.get('user');
                    
                    if (userParam) {
                        let userStr = userParam;
                        try {
                            userStr = decodeURIComponent(userParam);
                        } catch(e) {}
                        
                        const userData = JSON.parse(userStr);
                        if (userData && userData.id) {
                            console.log('✅ user_id из WebAppData.user.id:', userData.id);
                            return parseInt(userData.id);
                        }
                    }
                    
                    const userIdParam = params.get('user_id');
                    if (userIdParam && !isNaN(parseInt(userIdParam))) {
                        console.log('✅ user_id из WebAppData.user_id:', userIdParam);
                        return parseInt(userIdParam);
                    }
                } catch (e) {
                    console.error('Ошибка парсинга WebAppData:', e);
                }
            }
            
            // ========== 4. Telegram WebApp ==========
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe) {
                const initData = window.Telegram.WebApp.initDataUnsafe;
                console.log('📦 Telegram.initDataUnsafe:', initData);
                
                if (initData.user && initData.user.id) {
                    console.log('✅ user_id из Telegram:', initData.user.id);
                    return parseInt(initData.user.id);
                }
            }
            
            // ========== 5. ИЗ URL ПАРАМЕТРОВ (для прямой ссылки) ==========
            const urlUserId = urlParams.get('user_id') || urlParams.get('userId') || urlParams.get('uid');
            if (urlUserId && !isNaN(parseInt(urlUserId))) {
                console.log('✅ user_id из URL:', urlUserId);
                return parseInt(urlUserId);
            }
            
            // ========== 6. ИЗ LOCALSTORAGE (сохранённый ID) ==========
            const savedUserId = localStorage.getItem('fredi_user_id');
            if (savedUserId && !isNaN(parseInt(savedUserId))) {
                console.log('✅ user_id из localStorage:', savedUserId);
                return parseInt(savedUserId);
            }
            
            // ========== 7. РЕЖИМ ОТЛАДКИ (только для разработки) ==========
            const isDebug = urlParams.get('debug') === '1';
            if (isDebug) {
                const debugId = parseInt(urlParams.get('user_id') || '213102077');
                console.warn('⚠️ Режим отладки: используем ID:', debugId);
                return debugId;
            }
            
            // ========== 8. ЖДЁМ ЗАГРУЗКУ ДАННЫХ (если MAX есть, но данных нет) ==========
            if (window.MAX && window.MAX.WebApp) {
                console.log('⏳ MAX есть, ждем загрузки данных...');
                return new Promise((resolve) => {
                    let attempts = 0;
                    const maxAttempts = 50;
                    const interval = setInterval(async () => {
                        attempts++;
                        
                        if (window.MAX.WebApp.getUser) {
                            try {
                                const user = await window.MAX.WebApp.getUser();
                                if (user && user.id) {
                                    clearInterval(interval);
                                    resolve(parseInt(user.id));
                                    return;
                                }
                            } catch(e) {}
                        }
                        
                        if (window.MAX.WebApp.initDataUnsafe?.user?.id) {
                            clearInterval(interval);
                            resolve(parseInt(window.MAX.WebApp.initDataUnsafe.user.id));
                            return;
                        }
                        
                        if (window.MAX.WebApp.initDataUnsafe?.user_id) {
                            clearInterval(interval);
                            resolve(parseInt(window.MAX.WebApp.initDataUnsafe.user_id));
                            return;
                        }
                        
                        if (attempts >= maxAttempts) {
                            clearInterval(interval);
                            console.error('❌ Таймаут ожидания user_id');
                            resolve(null);
                        }
                    }, 100);
                });
            }
            
            console.error('❌ Не удалось получить user_id!');
            return null;
        }
        
        // ============================================
        // ПОЛУЧЕНИЕ ИМЕНИ ПОЛЬЗОВАТЕЛЯ
        // ============================================
        async function getUserNameFromMax() {
            // Мобильный MAX
            if (window.MAX && window.MAX.WebApp && window.MAX.WebApp.getUser) {
                try {
                    const user = await window.MAX.WebApp.getUser();
                    if (user && user.first_name) {
                        return user.first_name;
                    }
                } catch(e) {}
            }
            
            // Веб-версия MAX
            if (window.MAX && window.MAX.WebApp && window.MAX.WebApp.initDataUnsafe) {
                const initData = window.MAX.WebApp.initDataUnsafe;
                if (initData.user && initData.user.first_name) {
                    return initData.user.first_name;
                }
            }
            
            // Telegram
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe) {
                const initData = window.Telegram.WebApp.initDataUnsafe;
                if (initData.user && initData.user.first_name) {
                    return initData.user.first_name;
                }
            }
            
            // Из localStorage
            const savedName = localStorage.getItem('userName');
            if (savedName && savedName !== 'Гость') {
                return savedName;
            }
            
            return null;
        }
        
        // ============================================
        // ГЛОБАЛЬНАЯ ПЕРЕМЕННАЯ maxContext
        // ============================================
        window.maxContext = {
            user_id: null,
            user_name: 'Друг',
            isMax: !!(window.MAX && window.MAX.WebApp),
            initialized: false
        };
        
        // ============================================
        // АСИНХРОННАЯ ИНИЦИАЛИЗАЦИЯ
        // ============================================
        (async function() {
            try {
                const userId = await getUserIdFromMax();
                const userName = await getUserNameFromMax();
                
                window.maxContext.user_id = userId;
                window.maxContext.user_name = userName || 'Друг';
                window.maxContext.isMax = !!(window.MAX && window.MAX.WebApp);
                window.maxContext.initialized = true;
                
                if (userId) {
                    localStorage.setItem('fredi_user_id', userId);
                    console.log('🎯 maxContext.user_id:', userId);
                    console.log('🎯 maxContext.user_name:', window.maxContext.user_name);
                    console.log('🎯 maxContext.isMax:', window.maxContext.isMax);
                } else {
                    console.error('❌ Не удалось получить user_id');
                    // Показываем ошибку, если не в режиме отладки
                    const isDebug = new URLSearchParams(window.location.search).get('debug') === '1';
                    if (!isDebug) {
                        const container = document.getElementById('screenContainer');
                        if (container) {
                            container.innerHTML = `
                                <div style="display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;">
                                    <div>
                                        <div style="font-size:64px;">🔐</div>
                                        <h2>Ошибка входа</h2>
                                        <p>Не удалось получить ID пользователя.<br>Пожалуйста, откройте приложение через MAX.</p>
                                        <button onclick="location.reload()" style="padding:12px 24px;background:#248bf2;color:white;border:none;border-radius:40px;">Повторить</button>
                                    </div>
                                </div>
                            `;
                        }
                    }
                }
            } catch (error) {
                console.error('Ошибка инициализации:', error);
            }
        })();
    </script>
    
    <!-- ========== КОНФИГУРАЦИЯ API ========== -->

    <!-- ========== ИНИЦИАЛИЗАЦИЯ МИКРОФОНА ========== -->
    <script>
        // Создаем объект для управления микрофоном
        window.maxMicrophoneManager = {
            hasPermission: false,
            
            async requestMicrophone() {
                console.log('🎤 Запрос доступа к микрофону...');
                try {
                    let stream = null;
                    
                    // Пробуем через MAX WebApp
                    if (window.MAX && window.MAX.WebApp && window.MAX.WebApp.getUserMedia) {
                        try {
                            stream = await window.MAX.WebApp.getUserMedia({ audio: true });
                            console.log('✅ Доступ через MAX.WebApp');
                        } catch (e) {
                            console.warn('MAX getUserMedia failed:', e);
                        }
                    }
                    
                    // Стандартный Web API
                    if (!stream) {
                        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        console.log('✅ Доступ через Web API');
                    }
                    
                    stream.getTracks().forEach(track => track.stop());
                    this.hasPermission = true;
                    this.showToast('✅ Микрофон готов!', 'success');
                    return true;
                    
                } catch (error) {
                    console.error('Microphone error:', error);
                    this.hasPermission = false;
                    
                    if (error.name === 'NotAllowedError') {
                        this.showPermissionInstructions();
                    } else {
                        this.showToast('❌ Не удалось получить доступ к микрофону', 'error');
                    }
                    return false;
                }
            },
            
            showPermissionInstructions() {
                const isAndroid = /Android/i.test(navigator.userAgent);
                const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                
                let instructions = '';
                if (isAndroid) {
                    instructions = '🔊 <b>ВКЛЮЧИТЕ МИКРОФОН В MAX</b><br><br>1️⃣ Закройте чат<br>2️⃣ Настройки телефона → Приложения → MAX<br>3️⃣ Разрешения → Микрофон → Разрешить<br>4️⃣ Вернитесь и нажмите 🎤';
                } else if (isIOS) {
                    instructions = '🎤 <b>ВКЛЮЧИТЕ МИКРОФОН В MAX</b><br><br>1️⃣ Закройте чат<br>2️⃣ Настройки iPhone → MAX<br>3️⃣ Включите Микрофон<br>4️⃣ Вернитесь и нажмите 🎤';
                } else {
                    instructions = '🎤 <b>НУЖЕН ДОСТУП К МИКРОФОНУ</b><br><br>В настройках браузера разрешите доступ к микрофону.';
                }
                
                const modal = document.createElement('div');
                modal.className = 'microphone-modal';
                modal.innerHTML = `
                    <div class="microphone-modal-content">
                        <div style="font-size:48px;margin-bottom:16px;">🎤</div>
                        <h3>Нужен доступ к микрофону</h3>
                        <div style="color:#8e9aa6;line-height:1.6;margin:16px 0;text-align:left;">${instructions}</div>
                        <div style="display:flex;gap:12px;">
                            <button id="microphoneRetryBtn" class="modal-btn primary">🔄 ПРОВЕРИТЬ</button>
                            <button id="microphoneCloseBtn" class="modal-btn secondary">📱 ЗАКРЫТЬ</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                
                document.getElementById('microphoneRetryBtn')?.addEventListener('click', () => {
                    modal.remove();
                    this.requestMicrophone();
                });
                document.getElementById('microphoneCloseBtn')?.addEventListener('click', () => modal.remove());
            },
            
            showToast(message, type) {
                const toast = document.getElementById('toastMessage');
                if (toast) {
                    toast.textContent = message;
                    toast.className = `toast-message ${type} show`;
                    setTimeout(() => toast.classList.remove('show'), 3000);
                }
            }
        };
        
        // Запрашиваем микрофон при загрузке
        window.maxMicrophoneManager.requestMicrophone();
        
        // Инициализация дашборда
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 DOM загружен, создаём FrediDashboard');
            if (typeof FrediDashboard !== 'undefined') {
                window.dashboard = new FrediDashboard();
            } else {
                console.error('❌ FrediDashboard не загружен!');
            }
        });
    </script>
