<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ФРЕДИ - Виртуальный психолог</title>
    
    <!-- MAX Bridge (нужно для работы в MAX) -->
    <script src="https://max.ru/webapps/js/bridge.js"></script>
    
    <style>
        /* ========== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ========== */
        :root {
            /* Светлая тема (Telegram/MAX) */
            --tg-bg: #ffffff;
            --tg-text: #000000;
            --tg-hint: #707579;
            --tg-link: #0047b3;
            --tg-button: #40a7e3;
            --tg-button-text: #ffffff;
            --tg-secondary-bg: #f0f0f0;
            --tg-border: #e0e0e0;
            --tg-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            --tg-radius: 14px;
            --tg-radius-small: 8px;
            --header-height: 60px;
            --nav-height: 70px;
            
            /* Цвета сообщений */
            --message-user-bg: #40a7e3;
            --message-user-text: #ffffff;
            --message-bot-bg: #f0f0f0;
            --message-bot-text: #000000;
            
            /* MAX specific */
            --max-safe-top: 0px;
            --max-safe-bottom: 0px;
            --max-surface-light: rgba(255, 255, 255, 0.9);
            --max-surface-dark: rgba(31, 31, 31, 0.9);
            
            /* Фирменные цвета ФРЕДИ */
            --fredi-blue: #40a7e3;
            --fredi-blue-light: rgba(64, 167, 227, 0.1);
            --fredi-blue-medium: rgba(64, 167, 227, 0.2);
        }

        /* Темная тема */
        @media (prefers-color-scheme: dark) {
            :root {
                --tg-bg: #1f1f1f;
                --tg-text: #ffffff;
                --tg-hint: #aaaaaa;
                --tg-secondary-bg: #2d2d2d;
                --tg-border: #3a3a3a;
                --message-user-bg: #40a7e3;
                --message-user-text: #ffffff;
                --message-bot-bg: #2d2d2d;
                --message-bot-text: #ffffff;
                --max-surface-dark: rgba(31, 31, 31, 0.95);
            }
        }

        /* ========== MAX ТЕМЫ (через data-атрибут) ========== */
        [data-max-theme="light"] {
            --tg-bg: #f5f7fa;
            --tg-surface: var(--max-surface-light);
        }

        [data-max-theme="dark"] {
            --tg-bg: #0e1621;
            --tg-text: #ffffff;
            --tg-hint: #8e8e93;
            --tg-secondary-bg: #1e2530;
            --tg-border: #2b3139;
            --message-bot-bg: #1e2530;
            --message-bot-text: #ffffff;
            --tg-surface: var(--max-surface-dark);
        }

        /* ========== БАЗОВЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-bg);
            color: var(--tg-text);
            line-height: 1.5;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.2s ease;
            position: relative;
        }

        /* ========== ПОДЛОЖКА ========== */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 25px 25px, var(--tg-border) 1px, transparent 1px),
                radial-gradient(circle at 75px 75px, var(--tg-border) 1px, transparent 1px);
            background-size: 100px 100px;
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
            transition: opacity 0.3s ease;
        }

        [data-max-theme="dark"] body::before {
            opacity: 0.1;
        }

        /* ========== КОНТЕЙНЕР ========== */
        #app {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* ========== ШАПКА ========== */
        .header {
            height: var(--header-height);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--tg-border);
            background: var(--max-surface-light);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        [data-max-theme="dark"] .header {
            background: var(--max-surface-dark);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            font-size: 24px;
            cursor: pointer;
            color: var(--tg-button);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .back-btn.visible {
            display: flex;
        }

        .back-btn:hover {
            background: rgba(64, 167, 227, 0.1);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--tg-text);
            transition: color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-placeholder {
            width: 40px;
        }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: calc(var(--nav-height) + 16px);
            scroll-behavior: smooth;
            background: transparent;
            -webkit-overflow-scrolling: touch;
        }

        /* Стилизация скролла */
        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--tg-hint);
            border-radius: 4px;
        }

        /* ========== НИЖНЯЯ НАВИГАЦИЯ ========== */
        .nav-bar {
            height: var(--nav-height);
            background: var(--max-surface-light);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-top: 1px solid var(--tg-border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 600px;
            margin: 0 auto;
            z-index: 100;
            transition: background 0.3s ease, border-color 0.3s ease;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        [data-max-theme="dark"] .nav-bar {
            background: var(--max-surface-dark);
        }

        .nav-btn {
            flex: 1;
            height: 48px;
            border: none;
            background: transparent;
            color: var(--tg-hint);
            font-size: 14px;
            font-weight: 500;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .nav-btn span {
            font-size: 20px;
        }

        .nav-btn.active {
            color: var(--tg-button);
            background: rgba(64, 167, 227, 0.1);
        }

        [data-max-theme="dark"] .nav-btn.active {
            background: rgba(64, 167, 227, 0.2);
        }

        /* ========== СТЕКЛЯННЫЕ КАРТОЧКИ ========== */
        .glass-card {
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius);
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }

        [data-max-theme="dark"] .glass-card {
            background: var(--max-surface-dark);
        }

        /* ========== ЭКРАН ПРИВЕТСТВИЯ ========== */
        .welcome-screen {
            animation: fadeIn 0.3s ease-out;
        }

        .greeting {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--tg-text);
        }

        .welcome-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .welcome-text p {
            margin-bottom: 16px;
        }

        .stages-list {
            border-radius: var(--tg-radius);
            padding: 16px;
            margin: 20px 0;
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            border: 1px solid var(--tg-border);
        }

        [data-max-theme="dark"] .stages-list {
            background: var(--max-surface-dark);
        }

        .stage-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .stage-item:last-child {
            margin-bottom: 0;
        }

        .stage-number {
            font-size: 18px;
            min-width: 32px;
        }

        .stage-text {
            flex: 1;
        }

        /* ========== КАРТОЧКИ МЕНЮ ========== */
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .menu-card {
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
            text-align: left;
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius);
        }

        [data-max-theme="dark"] .menu-card {
            background: var(--max-surface-dark);
        }

        .menu-card:hover {
            background: rgba(64, 167, 227, 0.1);
            transform: translateX(4px);
        }

        .menu-emoji {
            font-size: 32px;
            min-width: 48px;
            text-align: center;
        }

        .menu-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .menu-desc {
            font-size: 13px;
            color: var(--tg-hint);
        }

        /* ========== ПРОФИЛЬ БЕЙДЖ ========== */
        .profile-badge {
            border-radius: 30px;
            padding: 12px 16px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            border: 1px solid var(--tg-border);
        }

        [data-max-theme="dark"] .profile-badge {
            background: var(--max-surface-dark);
        }

        .profile-badge:hover {
            background: rgba(64, 167, 227, 0.1);
            transform: translateY(-2px);
        }

        .profile-code {
            font-weight: 600;
            font-size: 15px;
        }

        .profile-arrow {
            color: var(--tg-hint);
            font-size: 18px;
        }

        /* ========== ЭКРАН ТЕСТА ========== */
        .test-screen {
            animation: fadeIn 0.3s;
        }

        .stage-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--tg-button);
        }

        .progress-bar {
            height: 6px;
            background: var(--tg-border);
            border-radius: 3px;
            margin: 8px 0 16px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--tg-button);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 13px;
            color: var(--tg-hint);
            text-align: right;
            display: block;
        }

        /* Карточка вопроса */
        .question-card {
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius);
            padding: 20px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
            color: var(--tg-text);
        }

        [data-max-theme="dark"] .question-card {
            background: var(--max-surface-dark);
        }

        /* Сетка для кнопок ответов */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        /* Кнопки ответов */
        .option-btn {
            width: 100%;
            padding: 16px 20px;
            background: var(--max-surface-light);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius);
            font-size: 16px;
            color: var(--tg-text);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            line-height: 1.5;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        [data-max-theme="dark"] .option-btn {
            background: var(--max-surface-dark);
        }

        .option-btn:hover {
            background: rgba(64, 167, 227, 0.1);
            border-color: var(--tg-button);
            transform: translateX(4px);
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        /* Буква на кнопке (А, Б, В, Г) */
        .option-letter {
            width: 32px;
            height: 32px;
            background: var(--tg-button);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* Стили для выбранного ответа */
        .option-btn.selected {
            background: rgba(64, 167, 227, 0.2);
            border-color: var(--tg-button);
        }

        .option-btn.selected .option-letter {
            background: white;
            color: var(--tg-button);
            border: 1px solid var(--tg-button);
        }

        /* ========== ЭКРАН РЕЗУЛЬТАТА ЭТАПА ========== */
        .stage-result {
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .result-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: 18px;
            line-height: 1.6;
            margin: 20px 0;
            padding: 20px;
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius);
            color: var(--tg-text);
            white-space: pre-line;
        }

        [data-max-theme="dark"] .result-text {
            background: var(--max-surface-dark);
        }

        .continue-btn {
            width: 100%;
            height: 56px;
            background: var(--tg-button);
            color: white;
            border: none;
            border-radius: var(--tg-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .continue-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
        }

        /* ========== ЭКРАН ПРОФИЛЯ ========== */
        .profile-screen {
            animation: fadeIn 0.3s;
        }

        .profile-section {
            background: var(--max-surface-light);
            backdrop-filter: blur(8px);
            border: 1px solid var(--tg-border);
            border-radius: var(--tg-radius);
            padding: 20px;
            margin-bottom: 20px;
        }

        [data-max-theme="dark"] .profile-section {
            background: var(--max-surface-dark);
        }

        .profile-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--tg-button);
        }

        .profile-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 16px 0 8px;
            color: var(--tg-button);
        }

        .profile-section p {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        /* Стили для векторов в профиле */
        .profile-vector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(64, 167, 227, 0.05);
            border-radius: var(--tg-radius);
        }

        .profile-vector .option-letter {
            width: 28px;
            height: 28px;
            font-size: 14px;
            background: var(--tg-button);
            color: white;
        }

        /* ========== КНОПКИ ДЕЙСТВИЙ ========== */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .action-btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: var(--tg-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: var(--tg-button);
            color: white;
        }

        .action-btn.primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
        }

        .action-btn.secondary {
            background: var(--max-surface-light);
            backdrop-filter: blur(5px);
            border: 1px solid var(--tg-border);
            color: var(--tg-text);
        }

        [data-max-theme="dark"] .action-btn.secondary {
            background: var(--max-surface-dark);
        }

        .action-btn.secondary:hover {
            background: rgba(64, 167, 227, 0.1);
            border-color: var(--tg-button);
        }

        /* Кнопка перезапуска теста */
        .restart-test-btn {
            margin: 8px 0 16px;
            background: rgba(64, 167, 227, 0.1) !important;
            border: 1px dashed var(--tg-button) !important;
            color: var(--tg-button) !important;
        }

        /* ========== ЗАГРУЗКА ========== */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--tg-border);
            border-top-color: var(--tg-button);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== АНИМАЦИИ ========== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.3s;
        }

        .fade-in {
            opacity: 1;
            transition: opacity 0.3s;
        }

        /* ========== УТИЛИТЫ ========== */
        .hidden {
            display: none !important;
        }

        .text-center {
            text-align: center;
        }

        .mt-2 { margin-top: 8px; }
        .mt-4 { margin-top: 16px; }
        .mt-6 { margin-top: 24px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-4 { margin-bottom: 16px; }
        .mb-6 { margin-bottom: 24px; }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 18px;
            }

            .greeting {
                font-size: 20px;
            }

            .stage-title {
                font-size: 18px;
            }

            .menu-emoji {
                font-size: 28px;
                min-width: 40px;
            }

            .action-btn {
                height: 48px;
                font-size: 15px;
            }

            .option-btn {
                padding: 14px 16px;
            }

            .question-card {
                padding: 16px;
                font-size: 16px;
            }
        }

        /* ========== MAX СПЕЦИФИЧНЫЕ СТИЛИ ========== */
        .max-webapp .header,
        .max-webapp .nav-bar {
            background: var(--max-surface-light);
            backdrop-filter: blur(15px) saturate(180%);
        }

        [data-max-theme="dark"] .max-webapp .header,
        [data-max-theme="dark"] .max-webapp .nav-bar {
            background: var(--max-surface-dark);
        }

        /* Плавное переключение тем */
        body, .header, .nav-bar, .mode-card, .message, .input-panel, .menu-card,
        .option-btn, .question-card, .profile-section, .result-text {
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <button class="back-btn" id="backBtn">←</button>
            <h1 id="header-title">👋 ФРЕДИ</h1>
            <div class="header-placeholder"></div>
        </header>
        
        <main class="content" id="content">
            <div class="loading-screen">
                <div class="spinner"></div>
                <p>Загрузка ФРЕДИ...</p>
            </div>
        </main>
        
        <nav class="nav-bar" id="navBar">
            <button class="nav-btn" data-screen="main">
                <span>🏠</span> Главная
            </button>
            <button class="nav-btn" data-screen="profile">
                <span>📊</span> Профиль
            </button>
            <button class="nav-btn" data-screen="goals">
                <span>🎯</span> Цели
            </button>
            <button class="nav-btn" data-screen="ask">
                <span>❓</span> Чат
            </button>
        </nav>
    </div>
    
    <script>
        (function() {
            console.log('📱 ФРЕДИ: Загрузка...');
            
            // ============================================
            // ВОПРОСЫ ЭТАПА 1
            // ============================================
            
            const STAGE_1_QUESTIONS = [
                {
                    text: "Как вы обычно реагируете, когда кто-то критикует вашу работу?",

                startTest: function() {
                    this.resetTest();
                    this.showTestScreen();
                },
                
                resetTest: function() {
                    this.testState = {
                        stage: 1,
                        questionIndex: 0,
                        answers: [],
                        stage1Scores: { EXTERNAL: 0, INTERNAL: 0, SYMBOLIC: 0, MATERIAL: 0 },
                        perceptionType: null,
                        stage2Levels: {},
                        thinkingLevel: null,
                        stage3Vectors: { "СБ": [], "ТФ": [], "УБ": [], "ЧВ": [] },
                        stage4Dilts: { "ENVIRONMENT": 0, "BEHAVIOR": 0, "CAPABILITIES": 0, "VALUES": 0, "IDENTITY": 0 },
                        dominantDilts: null,
                        stage5Patterns: [],
                        deepPatterns: {}
                    };
                    this.profile = {
                        perceptionType: null,
                        thinkingLevel: null,
                        vectors: {},
                        dominantDilts: null,
                        profileCode: null
                    };
                    this.hasProfile = false;
                },
                
                showTestScreen: function() {
                    const stage = this.testState.stage;
                    let questions;
                    
                    if (stage === 1) questions = STAGE_1_QUESTIONS;
                    else if (stage === 2) questions = STAGE_2_QUESTIONS;
                    else if (stage === 3) questions = STAGE_3_QUESTIONS;
                    else if (stage === 4) questions = STAGE_4_QUESTIONS;
                    else if (stage === 5) questions = STAGE_5_QUESTIONS;
                    else {
                        this.showScreen('main');
                        return;
                    }
                    
                    const qIndex = this.testState.questionIndex;
                    const question = questions[qIndex];
                    const total = questions.length;
                    const progress = Math.round((qIndex + 1) / total * 100);
                    
                    let html = `
                        <div class="test-screen">
                            <div class="stage-title">ЭТАП ${stage}: ${stage === 1 ? 'ВОСПРИЯТИЕ' : stage === 2 ? 'МЫШЛЕНИЕ' : stage === 3 ? 'ПОВЕДЕНИЕ' : stage === 4 ? 'ТОЧКА РОСТА' : 'ГЛУБИННЫЕ ПАТТЕРНЫ'}</div>
                            
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span>Вопрос ${qIndex + 1}/${total}</span>
                                <span>${progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            
                            <div class="question-card">
                                ${question.text}
                            </div>
                            
                            <div class="options-grid">
                    `;
                    
                    question.options.forEach((option, idx) => {
                        const letter = String.fromCharCode(65 + idx);
                        html += `
                            <button class="option-btn" onclick="window.app.answerQuestion('${option.id}')">
                                <span class="option-letter">${letter}</span>
                                <span class="option-text">${option.text}</span>
                            </button>
                        `;
                    });
                    
                    html += `</div></div>`;
                    document.getElementById('content').innerHTML = html;
                    this.showScreen('test');
                },
                
                answerQuestion: function(optionId) {
                    const stage = this.testState.stage;
                    let questions;
                    
                    if (stage === 1) questions = STAGE_1_QUESTIONS;
                    else if (stage === 2) questions = STAGE_2_QUESTIONS;
                    else if (stage === 3) questions = STAGE_3_QUESTIONS;
                    else if (stage === 4) questions = STAGE_4_QUESTIONS;
                    else if (stage === 5) questions = STAGE_5_QUESTIONS;
                    else return;
                    
                    const qIndex = this.testState.questionIndex;
                    const question = questions[qIndex];
                    const option = question.options.find(opt => opt.id === optionId);
                    
                    if (!option) return;
                    
                    // Сохраняем ответ
                    this.testState.answers.push({
                        stage: stage,
                        question: qIndex,
                        option: optionId,
                        text: option.text
                    });
                    
                    // Обновляем очки в зависимости от этапа
                    if (stage === 1 && option.scores) {
                        for (let key in option.scores) {
                            this.testState.stage1Scores[key] += option.scores[key];
                        }
                    } else if (stage === 2 && option.level) {
                        const level = option.level;
                        this.testState.stage2Levels[level] = (this.testState.stage2Levels[level] || 0) + 1;
                    } else if (stage === 3 && option.vector && option.level) {
                        if (this.testState.stage3Vectors[option.vector]) {
                            this.testState.stage3Vectors[option.vector].push(option.level);
                        }
                    } else if (stage === 4 && option.dilts) {
                        this.testState.stage4Dilts[option.dilts] = (this.testState.stage4Dilts[option.dilts] || 0) + 1;
                    } else if (stage === 5 && option.pattern && option.target) {
                        this.testState.stage5Patterns.push({
                            target: option.target,
                            pattern: option.pattern
                        });
                    }
                    
                    // Переходим к следующему вопросу
                    if (qIndex + 1 < questions.length) {
                        this.testState.questionIndex++;
                        this.showTestScreen();
                    } else {
                        this.completeStage();
                    }
                },
                
                completeStage: function() {
                    const stage = this.testState.stage;
                    
                    if (stage === 1) {
                        this.calculateStage1();
                    } else if (stage === 2) {
                        this.calculateStage2();
                    } else if (stage === 3) {
                        this.calculateStage3();
                    } else if (stage === 4) {
                        this.calculateStage4();
                    } else if (stage === 5) {
                        this.calculateStage5();
                    }
                },
                
                calculateStage1: function() {
                    const scores = this.testState.stage1Scores;
                    const external = scores.EXTERNAL;
                    const internal = scores.INTERNAL;
                    const symbolic = scores.SYMBOLIC;
                    const material = scores.MATERIAL;
                    
                    let perceptionType;
                    if (external > internal && symbolic > material) {
                        perceptionType = "СОЦИАЛЬНО-ОРИЕНТИРОВАННЫЙ";
                    } else if (external > internal && material >= symbolic) {
                        perceptionType = "СТАТУСНО-ОРИЕНТИРОВАННЫЙ";
                    } else if (internal >= external && symbolic > material) {
                        perceptionType = "СМЫСЛО-ОРИЕНТИРОВАННЫЙ";
                    } else {
                        perceptionType = "ПРАКТИКО-ОРИЕНТИРОВАННЫЙ";
                    }
                    
                    this.testState.perceptionType = perceptionType;
                    this.profile.perceptionType = perceptionType;
                    
                    const resultText = STAGE_1_FEEDBACK[perceptionType];
                    this.showStageResult(1, resultText, 2);
                },
                
                calculateStage2: function() {
                    const totalScore = Object.values(this.testState.stage2Levels).reduce((a, b) => a + b, 0);
                    let thinkingLevel;
                    
                    if (totalScore <= 10) thinkingLevel = 1;
                    else if (totalScore <= 20) thinkingLevel = 2;
                    else if (totalScore <= 30) thinkingLevel = 3;
                    else if (totalScore <= 40) thinkingLevel = 4;
                    else if (totalScore <= 50) thinkingLevel = 5;
                    else if (totalScore <= 60) thinkingLevel = 6;
                    else if (totalScore <= 70) thinkingLevel = 7;
                    else if (totalScore <= 80) thinkingLevel = 8;
                    else thinkingLevel = 9;
                    
                    this.testState.thinkingLevel = thinkingLevel;
                    this.profile.thinkingLevel = thinkingLevel;
                    
                    const resultText = `Ваш уровень мышления: **${thinkingLevel}/9**`;
                    this.showStageResult(2, resultText, 3);
                },
                
                calculateStage3: function() {
                    const vectors = this.testState.stage3Vectors;
                    const avgVectors = {};
                    
                    for (let v of ["СБ", "ТФ", "УБ", "ЧВ"]) {
                        if (vectors[v] && vectors[v].length > 0) {
                            avgVectors[v] = Math.round(vectors[v].reduce((a, b) => a + b, 0) / vectors[v].length);
                        } else {
                            avgVectors[v] = 3;
                        }
                    }
                    
                    this.profile.vectors = avgVectors;
                    
                    // Рассчитываем финальный уровень
                    const avgBehavior = Object.values(avgVectors).reduce((a, b) => a + b, 0) / 4;
                    const finalLevel = (this.testState.thinkingLevel || 5) + avgBehavior / 2;
                    const behaviorLevel = Math.min(5, Math.max(1, Math.ceil(finalLevel / 2)));
                    
                    const resultText = STAGE_3_FEEDBACK[behaviorLevel] || STAGE_3_FEEDBACK[3];
                    this.showStageResult(3, resultText, 4);
                },
                
                calculateStage4: function() {
                    const dilts = this.testState.stage4Dilts;
                    let dominant = "BEHAVIOR";
                    let maxCount = 0;
                    
                    for (let key in dilts) {
                        if (dilts[key] > maxCount) {
                            maxCount = dilts[key];
                            dominant = key;
                        }
                    }
                    
                    this.testState.dominantDilts = dominant;
                    this.profile.dominantDilts = dominant;
                    
                    const resultText = DILTS_LEVELS[dominant] || DILTS_LEVELS.BEHAVIOR;
                    this.showStageResult(4, resultText, 5);
                },
                
                calculateStage5: function() {
                    // Анализ паттернов
                    const patterns = {};
                    this.testState.stage5Patterns.forEach(p => {
                        if (!patterns[p.target]) patterns[p.target] = [];
                        patterns[p.target].push(p.pattern);
                    });
                    
                    this.testState.deepPatterns = patterns;
                    
                    // Формируем код профиля
                    if (this.profile.vectors) {
                        this.profile.profileCode = `СБ-${this.profile.vectors.СБ}_ТФ-${this.profile.vectors.ТФ}_УБ-${this.profile.vectors.УБ}_ЧВ-${this.profile.vectors.ЧВ}`;
                    }
                    
                    this.hasProfile = true;
                    
                    this.showStageResult(5, "✅ Тест завершен! Спасибо за участие.", null);
                },
                
                showStageResult: function(stage, resultText, nextStage) {
                    let html = `
                        <div class="stage-result">
                            <div class="result-emoji">${stage === 5 ? '🎉' : '✨'}</div>
                            <h2>Этап ${stage} завершен!</h2>
                            <div class="result-text">${resultText}</div>

                    if (nextStage) {
                        html += `
                            <button class="continue-btn" onclick="window.app.goToStage(${nextStage})">
                                Перейти к этапу ${nextStage} →
                            </button>
                        `;
                    } else {
                        html += `
                            <button class="continue-btn" onclick="window.app.showScreen('profile')">
                                Посмотреть профиль →
                            </button>
                        `;
                    }
                    
                    html += `</div>`;
                    document.getElementById('content').innerHTML = html;
                },
                
                goToStage: function(stage) {
                    this.testState.stage = stage;
                    this.testState.questionIndex = 0;
                    this.showTestScreen();
                },

                // ПРОФИЛЬ

                    let html = `

                            </div>
                            
                            <div class="action-buttons">
                                <button class="action-btn primary" onclick="window.app.showScreen('main')">🏠 На главную</button>
                            </div>
                        </div>
                    `;
                    
                    document.getElementById('content').innerHTML = html;
                },
                
                // ============================================
                // ЗАГЛУШКИ ДЛЯ ДРУГИХ ЭКРАНОВ
                // ============================================
                
                loadGoalsScreen: function() {
                    document.getElementById('content').innerHTML = `

                            <button class="action-btn secondary" onclick="window.app.showScreen('main')">На главную</button>

                },
                
                loadAskScreen: function() {
                    document.getElementById('content').innerHTML = `
                        <div class="text-center mt-4">

            };
            
            // Запускаем приложение
            window.app.init();
        })();
    </script>
