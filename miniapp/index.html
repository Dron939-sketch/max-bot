<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фреди - Виртуальный психолог</title>
    
    <!-- MAX Web App Bridge (для доступа к данным пользователя) -->
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="container">
        <!-- Шапка с кнопкой назад -->
        <div class="header">
            <button class="back-btn" id="backBtn" onclick="window.history.back()">←</button>
            <h1 id="header-title">🧠 ФРЕДИ</h1>
            <div class="header-placeholder"></div>
        </div>

        <!-- Основной контент -->
        <div id="content" class="content">
            <!-- Сюда будет загружаться активный экран -->
        </div>

        <!-- Нижняя навигация (всегда видна) -->
        <div class="nav-bar" id="navBar">
            <button class="nav-btn active" data-screen="main">🏠 Главная</button>
            <button class="nav-btn" data-screen="profile">📊 Портрет</button>
            <button class="nav-btn" data-screen="thought">🧠 Мысли</button>
            <button class="nav-btn" data-screen="goals">🎯 Цели</button>
        </div>
    </div>

    <!-- Подключаем JavaScript -->
    <script src="script.js"></script>
</body>
</html>
